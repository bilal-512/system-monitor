# System Resource Monitor – Configuration File
# ─────────────────────────────────────────────
# Monitoring
monitor_interval_ms=1000

# Logging
log_file=logs/sysmon.log

# Reports
report_dir=reports

# Alert thresholds (percentage 0-100)
alert_cpu_threshold=85.0
alert_mem_threshold=85.0
alert_disk_threshold=90.0

# Alert cooldown in seconds (prevent alert spam)
alert_cooldown_secs=60
